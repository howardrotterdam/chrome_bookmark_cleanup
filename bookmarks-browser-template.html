<style>
    /* Reset & Modern Font Base */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #212529;
        background-color: #f8f9fa;
        padding: 30px;
        margin: 0;
    }
    h1 {
        font-size: 24px;
        color: #343a40;
        border-bottom: 2px solid #dee2e6;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    /* Core Tree Structure & Indentation Guide Lines */
    dl {
        margin: 0 0 0 24px;   /* Structural Indentation */
        padding-left: 0;
    }
    
    /* Continuous vertical tracking lines */
    dl dl {
        border-left: 1px solid #ced4da; 
        transition: border-color 0.2s;
    }
    dl dl:hover {
        border-left-color: #495057; /* Darkens line when hovering over a section */
    }

    dt {
        margin: 4px 0;
        list-style: none;
        position: relative;
    }

    /* Folder Container Layout */
    .folder-header-container {
        display: inline-flex;
        align-items: center;
        background-color: #e9ecef;
        border-radius: 4px;
        padding-right: 6px;
    }
    .folder-header-container:hover {
        background-color: #dee2e6;
    }

    /* Folder Typography & Collapsible Mechanics */
    dt h3 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        padding: 4px 8px;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        user-select: none;
    }
    
    /* Modern arrow indicator before folder names */
    dt h3::before {
        content: "▼";
        font-size: 10px;
        margin-right: 6px;
        color: #6c757d;
        display: inline-block;
        transition: transform 0.15s ease;
    }

    /* Inline Branch Controls Styling */
    .branch-btn {
        font-size: 11px;
        font-family: monospace;
        font-weight: bold;
        color: #6c757d;
        background: #fff;
        border: 1px solid #ced4da;
        border-radius: 3px;
        padding: 1px 4px;
        margin-left: 4px;
        cursor: pointer;
        user-select: none;
        line-height: 1;
    }
    .branch-btn:hover {
        background-color: #212529;
        color: #fff;
        border-color: #212529;
    }

    /* Collapsed State Styles */
    .collapsed > .folder-header-container h3::before {
        transform: rotate(-90deg);
    }
    .collapsed > dl {
        display: none !important;
    }

    /* Anchor Link / Bookmark Styles */
    dt a {
        color: #0d6efd;
        text-decoration: none;
        padding: 2px 6px;
        border-radius: 3px;
        display: inline-block;
    }
    dt a:hover {
        background-color: #e7f1ff;
        text-decoration: underline;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Find all folder headers (H3) inside the Netscape structure
        const folders = document.querySelectorAll("dt h3");
        
        folders.forEach(h3 => {
            const parentDT = h3.parentElement; // The current <DT> element wrapping this folder block
            
            // 1. Wrap the H3 inside a container so we can position buttons neatly next to it
            const container = document.createElement("span");
            container.className = "folder-header-container";
            parentDT.insertBefore(container, h3);
            container.appendChild(h3);

            // 2. Append the branch-level action buttons
            const expandBtn = document.createElement("span");
            expandBtn.className = "branch-btn";
            expandBtn.innerText = "[+]";
            expandBtn.title = "Expand all subfolders here";
            
            const collapseBtn = document.createElement("span");
            collapseBtn.className = "branch-btn";
            collapseBtn.innerText = "[-]";
            collapseBtn.title = "Collapse all subfolders here";

            container.appendChild(expandBtn);
            container.appendChild(collapseBtn);
            
            // 3. Simple Single Folder Toggle Behavior
            h3.addEventListener("click", (e) => {
                parentDT.classList.toggle("collapsed");
            });

            // 4. Branch Level Control Logic
            expandBtn.addEventListener("click", (e) => {
                e.stopPropagation(); // Prevents triggering single-folder toggle
                // Make sure parent folder is open, then open all lower child folders inside this scope
                parentDT.classList.remove("collapsed");
                parentDT.querySelectorAll("dt").forEach(childDT => {
                    childDT.classList.remove("collapsed");
                });
            });

            collapseBtn.addEventListener("click", (e) => {
                e.stopPropagation(); // Prevents triggering single-folder toggle
                // Target all lower child folders inside this scope and collapse them
                parentDT.querySelectorAll("dt").forEach(childDT => {
                    childDT.classList.add("collapsed");
                });
                // Finally, collapse the parent folder itself
                parentDT.classList.add("collapsed");
            });
        });

        // Force all bookmark hyperlinks to open in clean new tabs automatically
        document.querySelectorAll("dt a").forEach(a => a.setAttribute("target", "_blank"));
    });
</script>
