<style>
    /* Reset & Modern Font Base */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #212529;
        background-color: #f8f9fa;
        padding: 30px;
        margin: 0;
    }
    h1 {
        font-size: 24px;
        color: #343a40;
        border-bottom: 2px solid #dee2e6;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    /* Core Tree Structure & Indentation Guide Lines */
    dl {
        margin: 0 0 0 24px;   /* Indent children folders */
        padding-left: 0;
    }
    
    /* Create the vertical tracking line on every nested list container */
    dl dl {
        border-left: 1px solid #ced4da; 
        transition: border-color 0.2s;
    }
    dl dl:hover {
        border-left-color: #495057; /* Darkens line when hovering over a section */
    }

    dt {
        margin: 4px 0;
        list-style: none;
        position: relative;
    }

    /* Folder Typography & Collapsible Mechanics */
    dt h3 {
        font-size: 14px;
        font-weight: 600;
        margin: 4px 0;
        padding: 4px 8px;
        display: inline-flex;
        align-items: center;
        background-color: #e9ecef;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
    }
    dt h3:hover {
        background-color: #dee2e6;
    }
    
    /* Add a modern arrow indicator before folder names */
    dt h3::before {
        content: "▼";
        font-size: 10px;
        margin-right: 6px;
        color: #6c757d;
        display: inline-block;
        transition: transform 0.15s ease;
    }

    /* Collapsed State Styles */
    .collapsed > h3::before {
        transform: rotate(-90deg);
    }
    .collapsed > dl {
        display: none !important;
    }

    /* Anchor Link / Bookmark Styles */
    dt a {
        color: #0d6efd;
        text-decoration: none;
        padding: 2px 6px;
        border-radius: 3px;
        display: inline-block;
    }
    dt a:hover {
        background-color: #e7f1ff;
        text-decoration: underline;
    }
    
    /* Force links to open in a new tab so you don't lose your view */
    dt a { target: _blank; } 
</style>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Find all folder headers (H3) inside the Netscape structure
        const folders = document.querySelectorAll("dt h3");
        
        folders.forEach(h3 => {
            const parentDT = h3.parentElement;
            
            // Toggle collapsed class on click
            h3.addEventListener("click", (e) => {
                parentDT.classList.toggle("collapsed");
            });
        });
    });
</script>
